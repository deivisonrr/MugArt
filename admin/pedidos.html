<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MugArt Admin | Pedidos</title>

  <link rel="icon" href="../assets/favicon.ico" sizes="any">
  <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/admin.css" />
</head>

<body class="admin-body">
  <aside class="admin-sidebar">
    <a class="admin-brand" href="dashboard.html">
      <img src="../assets/logo.png" alt="MugArt" />
    </a>

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="produtos.html">Produtos</a>
      <a href="categorias.html">Categorias</a>
      <a href="pedidos.html">Pedidos</a>
      <a href="cupons.html">Cupons</a>
      <a href="configuracoes.html">Configurações</a>
      <a href="../loja.html">Ver Loja</a>
    </nav>

    <button id="logoutBtn" class="logout-btn" type="button">Sair</button>
  </aside>

  <main class="admin-main">
    <header class="admin-header">
      <div>
        <p class="eyebrow">Vendas</p>
        <h1>Pedidos</h1>
      </div>
    </header>

    <section class="admin-panel">
      <div class="panel-head">
        <div>
          <p class="eyebrow">Lista</p>
          <h2>Pedidos recebidos</h2>
        </div>

        <button class="admin-action" id="createFakeOrder" type="button">Criar pedido teste</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pedido</th>
              <th>Cliente</th>
              <th>Pagamento</th>
              <th>Status</th>
              <th>Valor</th>
              <th>Data</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="ordersTable"></tbody>
        </table>
      </div>
    </section>
  </main>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   <script src="/js/supabase-config.js?v=5"></script>
   <script src="/admin/js/admin-auth.js?v=1"></script>
   <script src="/admin/js/admin.js?v=5"></script>
   <script src="/admin/js/admin.js?v=4"></script>
</body>
</html>
