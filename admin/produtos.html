<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>MugArt Admin | Produtos</title>

  <link rel="icon" href="../assets/favicon.ico" sizes="any">
  <link rel="shortcut icon" href="../assets/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="css/admin.css" />
</head>

<body class="admin-body">
  <aside class="admin-sidebar">
    <a class="admin-brand" href="dashboard.html">
      <img src="../assets/logo.png" alt="MugArt" />
    </a>

    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a class="active" href="produtos.html">Produtos</a>
      <a href="categorias.html">Categorias</a>
      <a href="pedidos.html">Pedidos</a>
      <a href="cupons.html">Cupons</a>
      <a href="/admin/analytics.html">Analytics</a>
      <a href="/admin/utm.html">Gerador de UTM</a>
      <a href="/admin/configuracoes.html">Configurações</a>
      <a href="../loja.html">Ver Loja</a>
    </nav>

    <button id="logoutBtn" class="logout-btn" type="button">Sair</button>
  </aside>

  <main class="admin-main">
    <header class="admin-header">
      <div>
        <p class="eyebrow">Catálogo</p>
        <h1>Produtos</h1>
      </div>

      <button class="admin-action" id="newProductBtn" type="button">Novo produto</button>
    </header>

    <section class="admin-grid-2">
      <form id="productForm" class="admin-panel form-panel">
        <input type="hidden" id="productId" />

        <div class="panel-head">
          <div>
            <p class="eyebrow">Cadastro</p>
            <h2 id="productFormTitle">Novo produto</h2>
          </div>
        </div>

        <div class="form-grid">
          <label>
            Nome
            <input id="productName" required placeholder="Caneca Coração Vermelha" />
          </label>

          <label>
            SKU
            <input id="productSku" required placeholder="MC-COR-VERM-001" />
          </label>

          <label>
            Categoria
            <select id="productCategory" required></select>
          </label>

          <label>
            Cor
            <input id="productColor" required placeholder="Vermelha" />
          </label>

          <label>
            Preço
            <input id="productPrice" type="number" min="0" step="0.01" required placeholder="44.90" />
          </label>

          <label>
            Preço promocional
            <input id="productOldPrice" type="number" min="0" step="0.01" placeholder="54.90" />
          </label>

          <label>
            Estoque
            <input id="productStock" type="number" min="0" step="1" required placeholder="10" />
          </label>

          <label class="full">
            Imagem principal
            <input id="productImage" required placeholder="A URL será preenchida automaticamente após upload" />

            <div class="upload-box">
              <div class="image-preview-wrap">
                <img id="productImagePreview" src="" alt="Preview do produto" />
                <span id="productImagePlaceholder">Nenhuma imagem selecionada</span>
              </div>

              <div class="upload-actions">
                <label class="upload-btn">
                  Escolher imagem
                  <input id="productImageFile" type="file" accept="image/png,image/jpeg,image/webp" />
                </label>

                <button id="uploadProductImageBtn" type="button" class="upload-send-btn">
                  Enviar imagem
                </button>
              </div>

              <small class="upload-help">
                Primeiro clique em <strong>Escolher imagem</strong>, depois em <strong>Enviar imagem</strong>.
                A URL será preenchida automaticamente.
              </small>
            </div>
          </label>

          <label class="full">
            Descrição
            <textarea id="productDescription" rows="4" required placeholder="Descrição do produto"></textarea>
          </label>

          <label>
            Produto ativo
            <select id="productActive">
              <option value="true">Sim</option>
              <option value="false">Não</option>
            </select>
          </label>

          <label>
            Destaque
            <select id="productFeatured">
              <option value="false">Não</option>
              <option value="true">Sim</option>
            </select>
          </label>
        </div>

        <div class="form-actions">
          <button type="submit">Salvar produto</button>
          <button type="button" class="secondary" id="clearProductForm">Limpar</button>
        </div>
      </form>

      <section class="admin-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Lista</p>
            <h2>Produtos cadastrados</h2>
          </div>

          <input id="productSearch" class="table-search" placeholder="Buscar..." />
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Produto</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Estoque</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="productsTable"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/supabase-config.js?v=5"></script>
<script src="/admin/js/admin-auth.js?v=1"></script>
<script src="/admin/js/admin.js?v=5"></script>
<script src="js/catalogo-profissional.js"></script>
<script src="js/admin-2.js"></script>
  
</body>
</html>
