<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script src="/js/consent-default.js?v=1"></script>
  <link rel="stylesheet" href="/css/cookie-consent.css?v=1">

  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Pagamento confirmado | MugArt</title>

  <link
    rel="icon"
    href="assets/favicon.ico"
    sizes="any"
  >

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      display: grid;
      place-items: center;
      font-family: Inter, Arial, sans-serif;
      color: #fff;
      background:
        radial-gradient(
          circle at 80% 10%,
          rgba(0, 216, 255, 0.15),
          transparent 35%
        ),
        radial-gradient(
          circle at 10% 20%,
          rgba(255, 59, 123, 0.12),
          transparent 30%
        ),
        #030406;
    }

    .success-card {
      width: min(620px, 100%);
      padding: 36px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 28px;
      background: rgba(255,255,255,.06);
      box-shadow: 0 28px 80px rgba(0,0,0,.35);
      text-align: center;
    }

    .success-icon {
      width: 78px;
      height: 78px;
      margin: 0 auto 18px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      color: #111;
      background: #ffd400;
      font-size: 38px;
      font-weight: 900;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 6vw, 46px);
    }

    p {
      color: rgba(255,255,255,.72);
      line-height: 1.6;
    }

    .payment-status-message {
      margin: 22px 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,.07);
      font-weight: 800;
    }

    .payment-status-message.success {
      color: #7dffad;
      background: rgba(40, 200, 100, .12);
    }

    .payment-status-message.warning,
    .payment-status-message.loading {
      color: #ffd400;
      background: rgba(255, 212, 0, .10);
    }

    .order-number {
      margin: 18px 0;
      color: rgba(255,255,255,.7);
      font-size: 14px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 24px;
    }

    .actions a {
      padding: 14px 18px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 900;
    }

    .primary {
      color: #111;
      background: #ffd400;
    }

    .secondary {
      color: #fff;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
    }

    @media (max-width: 560px) {
      .success-card {
        padding: 26px 18px;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="success-card">
    <div class="success-icon">✓</div>

    <h1>Obrigado pela compra!</h1>

    <p>
      Recebemos seu pagamento e estamos preparando
      a confirmação do pedido.
    </p>

    <div
      id="paymentStatusMessage"
      class="payment-status-message loading"
    >
      Confirmando seu pagamento...
    </div>

    <p class="order-number">
      Pedido:
      <strong id="confirmedOrderId">—</strong>
    </p>

    <div class="actions">
      <a
        class="primary"
        href="conta/pedidos.html"
      >
        Acompanhar pedido
      </a>

      <a
        class="secondary"
        href="loja.html"
      >
        Voltar à loja
      </a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase-config.js"></script>
  <script src="/js/site-mode-guard.js?v=1"></script>

  <!-- Carrega GTM/GA4/Meta antes do evento purchase -->
  <script src="/js/analytics-loader.js"></script>

  <script src="/js/pagamento-sucesso.js?v=1"></script>

  <script src="/js/cookie-consent.js?v=1"></script>
</body>
</html>
