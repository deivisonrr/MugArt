<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Pedidos | Admin MugArt</title>

  <link rel="icon" href="assets/favicon.ico" sizes="any">
  <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@400;600;700;800;900&display=swap");

    :root {
      --bg: #030406;
      --card: rgba(255, 255, 255, 0.06);
      --card2: rgba(255, 255, 255, 0.035);
      --stroke: rgba(255, 255, 255, 0.13);
      --white: #fff;
      --muted: rgba(255, 255, 255, 0.64);
      --yellow: #ffd400;
      --pink: #ff3b7b;
      --cyan: #00d8ff;
      --red: #ff2f3d;
      --green: #29d884;
      --orange: #ff9f1c;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 84% 10%, rgba(0, 216, 255, 0.14), transparent 34%),
        radial-gradient(circle at 8% 16%, rgba(255, 59, 123, 0.1), transparent 30%),
        #030406;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }

    button {
      cursor: pointer;
    }

    h1,
    h2,
    h3 {
      font-family: "Barlow Condensed", sans-serif;
      text-transform: uppercase;
      font-weight: 900;
    }

    .admin-shell {
      width: min(1500px, calc(100% - 32px));
      margin: 0 auto;
      padding: 24px 0 60px;
    }

    .admin-topbar {
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 24px;
    }

    .admin-brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .admin-brand img {
      width: 132px;
    }

    .admin-brand div span {
      color: var(--yellow);
      font-weight: 900;
      font-size: 13px;
      text-transform: uppercase;
    }

    .admin-brand h1 {
      font-size: clamp(32px, 5vw, 54px);
      line-height: 0.9;
    }

    .admin-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .admin-btn {
      border: 0;
      border-radius: 999px;
      padding: 13px 18px;
      background: var(--yellow);
      color: #111;
      font-family: "Barlow Condensed", sans-serif;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .admin-btn.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .admin-grid {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 22px;
      align-items: start;
    }

        .filters-card,
    .orders-card {
      background: var(--card);
      border: 1px solid var(--stroke);
      border-radius: 26px;
      backdrop-filter: blur(18px);
      padding: 22px;
    }

    .filters-card h2,
    .orders-card h2 {
      font-size: 32px;
      margin-bottom: 18px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .field input,
    .field select {
      height: 48px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      color: #fff;
      padding: 0 14px;
      outline: none;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-card {
      background: var(--card2);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 18px;
      padding: 16px;
    }

    .stat-card span {
      display:block;
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      margin-bottom:8px;
    }

    .stat-card strong {
      font-size:26px;
      font-weight:900;
      color:var(--yellow);
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    thead th{
      text-align:left;
      padding:14px;
      color:var(--muted);
      font-size:13px;
      text-transform:uppercase;
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    tbody td{
      padding:16px 14px;
      border-bottom:1px solid rgba(255,255,255,.05);
      vertical-align:middle;
    }

    tbody tr:hover{
      background:rgba(255,255,255,.04);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:90px;
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
    }

    .pending{
      background:rgba(255,159,28,.15);
      color:var(--orange);
    }

    .approved{
      background:rgba(41,216,132,.15);
      color:var(--green);
    }

    .production{
      background:rgba(0,216,255,.15);
      color:var(--cyan);
    }

    .sent{
      background:rgba(255,212,0,.15);
      color:var(--yellow);
    }

    @media(max-width:1100px){

      .admin-grid{
        grid-template-columns:1fr;
      }

    }

  </style>
</head>

<body>

<div class="admin-shell">

  <header class="admin-topbar">

      <div class="admin-brand">

          <img src="assets/logo.png">

          <div>
              <span>Painel Administrativo</span>
              <h1>Pedidos</h1>
          </div>

      </div>

      <div class="admin-actions">

          <button class="admin-btn secondary"
                  onclick="location.href='admin.html'">
              Produtos
          </button>

          <button class="admin-btn"
                  onclick="loadOrders()">
              Atualizar
          </button>

      </div>

  </header>

  <div class="admin-grid">

      <aside class="filters-card">

          <h2>Filtros</h2>

          <div class="stats">

              <div class="stat-card">
                  <span>Pedidos</span>
                  <strong id="totalOrders">0</strong>
              </div>

              <div class="stat-card">
                  <span>Hoje</span>
                  <strong id="todayOrders">0</strong>
              </div>

              <div class="stat-card">
                  <span>Pendentes</span>
                  <strong id="pendingOrders">0</strong>
              </div>

              <div class="stat-card">
                  <span>Produção</span>
                  <strong id="productionOrders">0</strong>
              </div>

          </div>

          <div class="field">
              <label>Pesquisar</label>
              <input
                     id="searchInput"
                     placeholder="Nome, pedido ou telefone">
          </div>

          <div class="field">
              <label>Status</label>

              <select id="statusFilter">

                  <option value="">Todos</option>

                  <option value="pending">Pendente</option>

                  <option value="approved">Pago</option>

                  <option value="production">Produção</option>

                  <option value="sent">Enviado</option>

              </select>

          </div>

      </aside>

      <section class="orders-card">

          <h2>Pedidos</h2>

          <table>

              <thead>

                  <tr>

                      <th>Pedido</th>
                      <th>Cliente</th>
                      <th>Pagamento</th>
                      <th>Frete</th>
                      <th>Total</th>
                      <th>Status</th>

                  </tr>

              </thead>

              <tbody id="ordersTable">

              </tbody>

          </table>

      </section>

  </div>

</div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>

<script>
let allOrders = [];

function money(value) {
    return new Intl.NumberFormat("pt-BR", {
        style: "currency",
        currency: "BRL"
    }).format(Number(value || 0));
}

function formatDate(value) {
    if (!value) return "-";

    return new Date(value).toLocaleDateString("pt-BR", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
    });
}

function statusLabel(status) {
    const map = {
        pending: "Pendente",
        approved: "Pago",
        production: "Produção",
        sent: "Enviado",
        canceled: "Cancelado"
    };

    return map[status] || status || "-";
}

function statusClass(status) {
    const map = {
        pending: "pending",
        approved: "approved",
        production: "production",
        sent: "sent"
    };

    return map[status] || "pending";
}

async function loadOrders() {
    if (!window.mugartSupabase) {
        alert("Supabase não carregou.");
        return;
    }

    const { data, error } = await mugartSupabase
        .from("orders")
        .select(`
            id,
            order_number,
            customer_name,
            customer_email,
            customer_phone,
            payment_method,
            payment_status,
            status,
            production_status,
            shipping_status,
            shipping,
            shipping_company,
            shipping_service,
            shipping_delivery_time,
            total,
            created_at
        `)
        .order("created_at", { ascending: false });

    if (error) {
        console.error(error);
        alert("Erro ao carregar pedidos.");
        return;
    }

    allOrders = data || [];

    renderStats();
    renderOrders();
}

function renderStats() {
    const today = new Date().toISOString().slice(0, 10);

    document.getElementById("totalOrders").textContent = allOrders.length;

    document.getElementById("todayOrders").textContent =
        allOrders.filter(order =>
            String(order.created_at || "").slice(0, 10) === today
        ).length;

    document.getElementById("pendingOrders").textContent =
        allOrders.filter(order =>
            order.payment_status === "pending" || order.status === "pending"
        ).length;

    document.getElementById("productionOrders").textContent =
        allOrders.filter(order =>
            order.production_status === "in_production" ||
            order.status === "production"
        ).length;
}

function renderOrders() {
    const table = document.getElementById("ordersTable");
    const search = document.getElementById("searchInput").value.toLowerCase();
    const status = document.getElementById("statusFilter").value;

    let orders = allOrders.filter(order => {
        const text = [
            order.order_number,
            order.customer_name,
            order.customer_email,
            order.customer_phone
        ].join(" ").toLowerCase();

        const matchSearch = !search || text.includes(search);
        const matchStatus = !status || order.status === status || order.payment_status === status;

        return matchSearch && matchStatus;
    });

    if (!orders.length) {
        table.innerHTML = `
            <tr>
                <td colspan="6" style="text-align:center;color:rgba(255,255,255,.55);padding:30px;">
                    Nenhum pedido encontrado.
                </td>
            </tr>
        `;
        return;
    }

    table.innerHTML = orders.map(order => {
        const shippingText = order.shipping_company
            ? `${order.shipping_company} - ${order.shipping_service || ""}<br><small>${money(order.shipping)} • ${order.shipping_delivery_time || "-"} dias úteis</small>`
            : `${money(order.shipping || 0)}`;

        return `
            <tr onclick="openOrder('${order.id}')" style="cursor:pointer;">
                <td>
                    <strong>${order.order_number || "-"}</strong><br>
                    <small>${formatDate(order.created_at)}</small>
                </td>

                <td>
                    <strong>${order.customer_name || "-"}</strong><br>
                    <small>${order.customer_phone || ""}</small>
                </td>

                <td>
                    <strong>${order.payment_method || "-"}</strong><br>
                    <small>${statusLabel(order.payment_status)}</small>
                </td>

                <td>${shippingText}</td>

                <td>
                    <strong style="color:var(--yellow);">${money(order.total)}</strong>
                </td>

                <td>
                    <span class="badge ${statusClass(order.status)}">
                        ${statusLabel(order.status)}
                    </span>
                </td>
            </tr>
        `;
    }).join("");
}

document.addEventListener("DOMContentLoaded", () => {
    loadOrders();

    document.getElementById("searchInput").addEventListener("input", renderOrders);
    document.getElementById("statusFilter").addEventListener("change", renderOrders);
});

  <script>
async function openOrder(orderId) {
    const { data: order, error } = await mugartSupabase
        .from("orders")
        .select(`
            *,
            order_items (*),
            order_addresses (*)
        `)
        .eq("id", orderId)
        .single();

    if (error) {
        console.error(error);
        alert("Erro ao abrir pedido.");
        return;
    }

    const items = order.order_items || [];
    const address = order.order_addresses?.[0] || {};

    const message =
        `Pedido: ${order.order_number || "-"}\n\n` +
        `Cliente: ${order.customer_name || "-"}\n` +
        `Telefone: ${order.customer_phone || "-"}\n` +
        `E-mail: ${order.customer_email || "-"}\n\n` +
        `Status: ${statusLabel(order.status)}\n` +
        `Pagamento: ${statusLabel(order.payment_status)}\n\n` +
        `Frete: ${order.shipping_company || "-"} ${order.shipping_service || ""}\n` +
        `Valor frete: ${money(order.shipping || 0)}\n` +
        `Prazo: ${order.shipping_delivery_time || "-"} dias úteis\n\n` +
        `Endereço:\n` +
        `${address.street || "-"}, ${address.number || "-"}\n` +
        `${address.neighborhood || "-"} - ${address.city || "-"} / ${address.state || "-"}\n` +
        `CEP: ${address.zip || "-"}\n\n` +
        `Itens:\n` +
        items.map(item =>
            `- ${item.quantity}x ${item.product_name} - ${money(item.total)}`
        ).join("\n") +
        `\n\nTotal: ${money(order.total)}`;

    alert(message);
}
</script>
<script src="/js/supabase-config.js"></script>
<script src="/js/analytics-loader.js"></script>
</body>
</html>
